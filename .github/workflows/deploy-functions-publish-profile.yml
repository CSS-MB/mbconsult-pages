name: Deploy Azure Function (Publish Profile)

on:
  push:
    branches:
      - main
    paths:
      - "ContactFormHandler/**"
      - "HealthPing/**"
      - "host.json"
      - "package.json"
      - ".github/workflows/deploy-functions-publish-profile.yml"

env:
  AZURE_FUNCTIONAPP_NAME: "mbconsult-function-app"
  AZURE_FUNCTIONAPP_PACKAGE_PATH: "."
  NODE_VERSION: "20.x"

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AZURE_FUNCTIONAPP_PUBLISH_PROFILE: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install & Verify Structure
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
          echo "Verify critical files:"
          test -f host.json || (echo "host.json missing" && exit 1)
          test -d ContactFormHandler || (echo "ContactFormHandler dir missing" && exit 1)
          test -f ContactFormHandler/function.json || (echo "ContactFormHandler/function.json missing" && exit 1)
          test -f ContactFormHandler/index.js || (echo "ContactFormHandler/index.js missing" && exit 1)
          test -d node_modules/nodemailer || (echo "nodemailer not installed" && exit 1)
          echo "Structure OK"

      - name: Verify Publish Profile Secret
        run: |
          [ -z "${AZURE_FUNCTIONAPP_PUBLISH_PROFILE}" ] && { echo "::error::Missing publish profile secret"; exit 1; } || echo "Publish profile present."

      - name: Deploy
        uses: Azure/functions-action@v1
        id: functions
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          publish-profile: ${{ env.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}

      - name: Initial Health Probe
        run: |
          echo "Health probe:"
          curl -i -m 20 https://${{ env.AZURE_FUNCTIONAPP_NAME }}.azurewebsites.net/api/health || true

      - name: Warm-up & Non-404 Assertion
        run: |
          set -e
          TARGET="https://${{ env.AZURE_FUNCTIONAPP_NAME }}.azurewebsites.net/api/ContactFormHandler"
          echo "Warming $TARGET"
          ATTEMPTS=0
          MAX=12
          SLEEP=5
          while [ $ATTEMPTS -lt $MAX ]; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
              -H "Content-Type: application/json" \
              -d '{"name":"DeployWarm","email":"warm@mbc.io","message":"Warm sequence message content"}' \
              "$TARGET" || echo "000")
            echo "Attempt $((ATTEMPTS+1)) -> HTTP $STATUS"
            if [ "$STATUS" != "404" ] && [ "$STATUS" != "000" ]; then
              echo "Non-404 achieved"
              exit 0
            fi
            ATTEMPTS=$((ATTEMPTS+1))
            sleep $SLEEP
          done
          echo "::error::Function remained 404 after $MAX attempts"
          exit 1

      - name: Final Health Check
        run: |
          curl -s -i https://${{ env.AZURE_FUNCTIONAPP_NAME }}.azurewebsites.net/api/health || true
